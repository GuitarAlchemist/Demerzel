name: Demerzel Cross-Repo Wiki Sync

on:
  schedule:
    # Run weekly on Wednesdays at 10:27 AM EST (15:27 UTC)
    - cron: '27 15 * * 3'
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (ix, tars, ga, or all)'
        required: false
        default: 'all'
        type: string

permissions:
  contents: write

jobs:
  sync-consumer-wikis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        repo: [ix, tars, ga]
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}

    steps:
      - name: Check if target matches
        id: filter
        run: |
          TARGET="${{ inputs.target_repo || 'all' }}"
          REPO="${{ matrix.repo }}"
          if [ "$TARGET" = "all" ] || [ "$TARGET" = "$REPO" ]; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          else
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target repo
        if: steps.filter.outputs.SHOULD_RUN == 'true'
        uses: actions/checkout@v4
        with:
          repository: GuitarAlchemist/${{ matrix.repo }}
          path: repo
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check wiki exists
        id: wiki_check
        if: steps.filter.outputs.SHOULD_RUN == 'true'
        run: |
          git clone "https://$GH_TOKEN@github.com/GuitarAlchemist/${{ matrix.repo }}.wiki.git" wiki 2>/dev/null && echo "WIKI_EXISTS=true" >> $GITHUB_OUTPUT || echo "WIKI_EXISTS=false" >> $GITHUB_OUTPUT

      - name: Generate wiki pages
        if: steps.filter.outputs.SHOULD_RUN == 'true' && steps.wiki_check.outputs.WIKI_EXISTS == 'true'
        run: |
          REPO="${{ matrix.repo }}"
          REPO_URL="https://github.com/GuitarAlchemist/$REPO"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # ── Home page ──
          cat > wiki/Home.md <<HOMEEOF
          <!-- Auto-generated by Demerzel Wiki Sync -->

          # ${REPO} — GuitarAlchemist

          > Part of the [GuitarAlchemist](https://github.com/GuitarAlchemist) ecosystem, governed by [Demerzel](https://github.com/GuitarAlchemist/Demerzel).

          HOMEEOF

          # Add repo-specific content based on README or CLAUDE.md
          if [ -f repo/README.md ]; then
            echo "## Overview" >> wiki/Home.md
            echo "" >> wiki/Home.md
            # Extract first section of README (up to second H2)
            awk '/^## /{if(++c==2)exit}c>=0' repo/README.md >> wiki/Home.md
            echo "" >> wiki/Home.md
          fi

          # Add CLAUDE.md summary (excluding governance section)
          if [ -f repo/CLAUDE.md ]; then
            echo "## Development Guide" >> wiki/Home.md
            echo "" >> wiki/Home.md
            # Extract content before governance markers
            sed -n '1,/<!-- BEGIN DEMERZEL GOVERNANCE -->/p' repo/CLAUDE.md | head -50 >> wiki/Home.md
            echo "" >> wiki/Home.md
            echo "[Full CLAUDE.md](${REPO_URL}/blob/master/CLAUDE.md)" >> wiki/Home.md
          fi

          # ── Governance page ──
          if [ -d repo/governance/demerzel ]; then
            cat > wiki/Governance.md <<GOVEOF
          <!-- Auto-generated by Demerzel Wiki Sync -->

          # Governance

          This repo is governed by the [Demerzel governance framework](https://github.com/GuitarAlchemist/Demerzel).

          ## Constitution Hierarchy

          - [Asimov Laws](https://github.com/GuitarAlchemist/Demerzel/wiki/Constitution-Asimov) (Articles 0-5)
          - [Default Constitution](https://github.com/GuitarAlchemist/Demerzel/wiki/Constitution-Default) (Articles 1-11)
          - [Governance Mandate](https://github.com/GuitarAlchemist/Demerzel/wiki/Constitution-Mandate)

          ## Policies

          See [Demerzel Policy Reference](https://github.com/GuitarAlchemist/Demerzel/wiki/Policies)

          ## State Directory

          This repo maintains belief persistence in \`state/\`:
          - \`state/beliefs/\` — Tetravalent belief states
          - \`state/pdca/\` — PDCA cycle tracking
          - \`state/knowledge/\` — Knowledge transfer records
          - \`state/snapshots/\` — Belief snapshots

          ---
          *Governed by [Demerzel](https://github.com/GuitarAlchemist/Demerzel) under the Asimov constitution.*
          GOVEOF
          fi

          # ── Project Structure page ──
          cat > wiki/Project-Structure.md <<STRUCTEOF
          <!-- Auto-generated by Demerzel Wiki Sync -->

          # Project Structure

          \`\`\`
          $(cd repo && find . -maxdepth 2 -type d \
            ! -path './.git*' \
            ! -path './node_modules*' \
            ! -path './bin*' \
            ! -path './obj*' \
            ! -path './target*' \
            ! -path './.vs*' \
            | sort | head -40 \
            | sed 's|^\./||')
          \`\`\`

          ---
          See also: [Home](Home) | [Governance](Governance)
          STRUCTEOF

          # ── Recent Activity page ──
          cat > wiki/Recent-Activity.md <<ACTEOF
          <!-- Auto-generated by Demerzel Wiki Sync -->

          # Recent Activity

          ## Last 20 Commits

          | Date | Author | Message |
          |------|--------|---------|
          $(cd repo && git log --oneline --format='| %ci | %an | %s |' -20 2>/dev/null)

          ---
          *Auto-generated from git history. Last synced: ${TIMESTAMP}.*
          ACTEOF

          # ── Sidebar ──
          cat > wiki/_Sidebar.md <<SIDEEOF
          **[Home](Home)**

          - [Project Structure](Project-Structure)
          - [Governance](Governance)
          - [Recent Activity](Recent-Activity)

          ---
          *Synced by [Demerzel](https://github.com/GuitarAlchemist/Demerzel)*
          SIDEEOF

          # ── Footer ──
          cat > wiki/_Footer.md <<FOOTEOF
          ---
          *Auto-generated by [Demerzel Wiki Sync](https://github.com/GuitarAlchemist/Demerzel) on ${TIMESTAMP}.*
          FOOTEOF

          echo "Generated wiki pages for $REPO"
          ls wiki/*.md

      - name: Push wiki changes
        if: steps.filter.outputs.SHOULD_RUN == 'true' && steps.wiki_check.outputs.WIKI_EXISTS == 'true'
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes for ${{ matrix.repo }}"
          else
            git commit -m "Auto-sync wiki for ${{ matrix.repo }} from $(cd ../repo && git rev-parse --short HEAD)"
            git push
            echo "Wiki updated for ${{ matrix.repo }}"
          fi
