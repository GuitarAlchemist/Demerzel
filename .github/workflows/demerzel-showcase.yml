              TITLE="🎵 The Circle of Fifths — Music Theory's Most Powerful Diagram"
              BODY='## 🎵 The Circle of Fifths

The single most important diagram in music theory — and it fits on a napkin.

### What It Is

Arrange all 12 keys in a circle, each a perfect 5th apart:

```
        C
    F       G
  Bb          D
  Eb          A
    Ab      E
        Db/C#
```

### Why It Matters

1. **Key signatures:** Moving clockwise adds sharps. Counter-clockwise adds flats.
2. **Chord relationships:** Adjacent keys share 6 of 7 notes.
3. **Modulation:** Moving one step around the circle = smoothest key change.
4. **Chord progressions:** Most progressions move in 4ths/5ths (around the circle).

### The Patterns

| Movement | Interval | Feeling |
|----------|----------|---------|
| Clockwise 1 step | Perfect 5th up | Strong resolution |
| Counter-clockwise 1 step | Perfect 4th up | Gospel, blues |
| Opposite side | Tritone | Maximum tension |
| 3 steps clockwise | Major 3rd | Bright modulation |

### Mind-Blowing Fact

The ii-V-I jazz progression (Dm7-G7-Cmaj7) moves **counter-clockwise** around the circle: D→G→C. Every jazz tune is basically a walk around the circle!

### Guitar Alchemist Implementation

Our domain engine represents this as a mathematical structure — see [GA.Domain.Core.PitchClass](https://github.com/GuitarAlchemist/ga/tree/master/Common/GA.Domain.Core) where pitch class arithmetic follows modular arithmetic mod 12.

---
*🎪 Presented by **Seldon** | [Guitar Alchemist](https://github.com/GuitarAlchemist/ga)*'
