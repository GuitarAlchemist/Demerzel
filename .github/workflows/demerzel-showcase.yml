### The Key Innovation: Pure Domain Computation

These skills don'\''t use an LLM to answer questions — they use **deterministic music theory computation**:
- `IntervalInfoSkill` calculates intervals using semitone arithmetic
- `ScaleInfoSkill` generates scale notes from the interval formula
