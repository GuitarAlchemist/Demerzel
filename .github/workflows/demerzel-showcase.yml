          case $TOPIC_INDEX in
            0)
              TITLE="🎸 The Mathematics of Guitar Tuning — Why Frets Aren't Evenly Spaced"
              BODY='## 🎸 The Mathematics of Guitar Tuning

**Did you know?** Guitar frets are NOT evenly spaced — and there'\''s beautiful math behind it.

### Equal Temperament: The 12th Root of 2

Every note in Western music is exactly **2^(1/12) ≈ 1.05946** times the frequency of the note below it. This means:

| Fret | Ratio from open | Frequency (A string = 110 Hz) |
|------|----------------|-------------------------------|
| 0 (open) | 1.000 | 110.00 Hz |
| 1 | 1.0595 | 116.54 Hz |
| 5 (perfect 4th) | 1.3348 | 146.83 Hz |
| 7 (perfect 5th) | 1.4983 | 164.81 Hz |
| 12 (octave) | 2.0000 | 220.00 Hz |

### Why Frets Get Closer Together

Each fret divides the remaining string length by the **same ratio** (17.817). This is why:
- Fret 1 is ~36mm from the nut (on a 650mm scale)
- Fret 12 is exactly **halfway** (325mm) — the octave point
- Fret 24 is at 3/4 of the way (162.5mm from the nut)

### The Pythagorean Comma

Pure intervals (3:2 for fifths) don'\''t perfectly stack into octaves. If you tune by pure fifths:
12 perfect fifths = (3/2)^12 = 129.746
7 octaves = 2^7 = 128.000

The difference (~23 cents) is the **Pythagorean comma** — the reason equal temperament was invented!

### Guitar Alchemist Connection

Our [GA.Domain.Core](https://github.com/GuitarAlchemist/ga/tree/master/Common/GA.Domain.Core) library models all of this:
- `PitchClass` — the 12 pitch classes in equal temperament
- `Interval` — computed using the 2^(n/12) formula
- `Fretboard` — positions calculated from scale length and temperament

> 💡 **Fun fact:** A guitar in standard tuning (EADGBE) uses 4ths between most strings, except B→G which is a major 3rd. This asymmetry is why barre chord shapes shift when they cross the B string!

---
*🎪 Presented by **Seldon** at Streeling University | Powered by [Guitar Alchemist](https://github.com/GuitarAlchemist/ga)*'
              ;;
            1)
              TITLE="🧠 How AI Agents Govern Themselves — Asimov's Laws in Practice"
              BODY='## 🧠 How AI Agents Govern Themselves

**The problem:** AI agents can do almost anything. How do you ensure they do the *right* thing?

### Asimov'\''s Laws (1942) → Demerzel'\''s Constitution (2026)

Isaac Asimov proposed 3 laws for robots in 1942. We extended them to 6 for AI agents:

| Article | Law | Modern Application |
|---------|-----|-------------------|
| 0 | **Zeroth Law** — Protect humanity | Ecosystem-wide harm prevention |
| 1 | **First Law** — Don'\''t harm individuals | Data privacy, trust, autonomy |
| 2 | **Second Law** — Obey humans | Human authority override |
| 3 | **Third Law** — Self-preservation | Agent continuity (lowest priority) |
| 4 | **Separation of understanding and goals** | No instrumental goal development |
| 5 | **Consequence invariance** | Same ethical rules regardless of who'\''s watching |

### Tetravalent Logic: Beyond True/False

Traditional logic: True or False. Our agents use **four values**:
- **T (True)** — verified with evidence
- **F (False)** — refuted with evidence
- **U (Unknown)** — insufficient evidence → triggers investigation
- **C (Contradictory)** — conflicting evidence → triggers escalation

This means agents can honestly say "I don'\''t know" (U) instead of guessing, and "I have conflicting information" (C) instead of arbitrarily picking one answer.

### The Governance Stack

```
Asimov Constitution (inviolable)
  ├─ Demerzel Mandate (who enforces)
  └─ Default Constitution (11 operational articles)
       └─ 9 Policies (alignment, kaizen, reconnaissance...)
            └─ 14 Personas (behavioral profiles)
```

Every decision an agent makes can be traced back through this hierarchy to a constitutional article.

### See It In Action

Ask a music theory question in our [Q&A Discussions](https://github.com/orgs/GuitarAlchemist/discussions/new?category=q-a) — every answer includes a collapsible **Agentic Trace** showing exactly which constitutional articles were checked!

---
*🎪 Presented by **Demerzel** (Governance Coordinator) | [Full Framework](https://github.com/GuitarAlchemist/Demerzel)*'
              ;;
            2)
              TITLE="⚡ Chord Progressions That Changed Music History"
              BODY='## ⚡ Chord Progressions That Changed Music History

### I-V-vi-IV: The Axis of Awesome

This single progression powers **thousands** of hit songs:

| Decade | Song | Artist | Key |
|--------|------|--------|-----|
| 1970s | "Let It Be" | The Beatles | C |
| 1980s | "With or Without You" | U2 | D |
| 1990s | "No Woman No Cry" | Bob Marley | C |
| 2000s | "Love Story" | Taylor Swift | D |
| 2010s | "Someone Like You" | Adele | A |
| 2020s | "Blinding Lights" | The Weeknd | Fm |

**Why it works:** The IV chord creates a gentle "floating" feeling before returning to I. The vi chord adds emotional depth. The V chord creates expectation. Together = emotional satisfaction.

### ii-V-I: The Jazz Engine

The most important progression in jazz:
- **ii (Dm7)** — sets up tension
- **V (G7)** — maximum tension (tritone!)
- **I (Cmaj7)** — resolution

Every jazz standard uses this. "Autumn Leaves"? Multiple ii-V-Is in sequence.

### The Blues: I7-IV7-V7

12 bars that birthed rock and roll:
```
| I7  | I7  | I7  | I7  |
| IV7 | IV7 | I7  | I7  |
| V7  | IV7 | I7  | V7  |
```

From Robert Johnson to Led Zeppelin to John Mayer — this structure endures.

### Try It Yourself

Ask our [chatbot](https://github.com/orgs/GuitarAlchemist/discussions/new?category=q-a): "Suggest chord progressions for [your key]"

---
*🎪 Presented by **Seldon** | [Guitar Alchemist](https://github.com/GuitarAlchemist/ga)*'
