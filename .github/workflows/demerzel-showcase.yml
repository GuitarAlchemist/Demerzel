              TITLE="🔬 Neuro-Symbolic AI — How TARS Reasons About Music"
              BODY="## 🔬 Neuro-Symbolic AI in Music

### The Problem with Pure LLMs

LLMs can *talk about* music theory, but they can't *compute* it reliably. Ask GPT to list the notes in Db Lydian and you might get a wrong answer — it's pattern-matching, not reasoning.

### The TARS Approach: Constrained Generation

[TARS](https://github.com/GuitarAlchemist/tars) combines neural networks with symbolic reasoning:

\`\`\`
Neural (fuzzy)          Symbolic (crisp)
├─ Natural language  →  ├─ Parse intent
├─ Context awareness →  ├─ Select grammar rule
├─ Creativity        →  ├─ Apply music theory axioms
└─ Explanation       →  └─ Compute deterministic answer
\`\`\`

### Probabilistic Grammars for Music

Instead of free-form generation, TARS uses **grammar-constrained decoding**:
- A chord progression must follow harmonic rules
- Scale notes must be mathematically correct
- Intervals must satisfy the semitone formula

The grammar *prevents* the AI from generating musically impossible outputs.

### Tetravalent Belief States

TARS tracks confidence using four values (T/F/U/C):
- \"Is Db Lydian = Db Eb F G Ab Bb C?\" → **T, confidence 1.0** (computed)
- \"Is this progression in the style of Coltrane?\" → **U, confidence 0.4** (subjective)
- \"Two sources disagree on the chord quality\" → **C** (investigate)

### See the Code

- [BeliefState.fs](https://github.com/GuitarAlchemist/tars/blob/master/src/TarsEngine.FSharp.Core/Reasoning/BeliefState.fs) — Tetravalent logic in F#
- [ConstitutionalGovernance.fs](https://github.com/GuitarAlchemist/tars/blob/master/src/TarsEngine.FSharp.Core/Grammar/ConstitutionalGovernance.fs) — Grammar governance

---
*🎪 Presented by **Seldon** | [TARS](https://github.com/GuitarAlchemist/tars) + [Demerzel](https://github.com/GuitarAlchemist/Demerzel)*"
