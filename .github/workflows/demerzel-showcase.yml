### The Challenge
Build a fully functional music theory chatbot covering scales, chords, progressions, and practice routines.

### The Approach: Demerzel Agent Teams

Instead of one agent doing everything sequentially, we used **3 specialized agents working in parallel**:

| Agent | Role | What They Built | Time |
