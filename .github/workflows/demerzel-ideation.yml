name: Demerzel & Seldon Ideation

on:
  # Trigger on significant changes — fresh ideas when work happens
  push:
    branches: [master]
    paths:
      - 'policies/**'
      - 'personas/**'
      - 'constitutions/**'
      - 'state/**'
      - 'schemas/**'
  # Also run 3x/week for periodic reflection
  schedule:
    - cron: '47 13 * * 1,3,5'  # Mon/Wed/Fri 8:47 AM EST
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  issues: write

jobs:
  generate-ideas:
    runs-on: [self-hosted, demerzel]
    timeout-minutes: 10

    steps:
      - name: Checkout Demerzel
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Check if ideation already posted today
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "DATE=$DATE" >> $GITHUB_OUTPUT

          # Search for an existing ideation discussion posted today
          EXISTING=$(gh api graphql -f query='
            query {
              repository(owner: "GuitarAlchemist", name: "Demerzel") {
                discussions(first: 5, orderBy: {field: CREATED_AT, direction: DESC}) {
                  nodes { title createdAt }
                }
              }
            }' --jq ".data.repository.discussions.nodes[] | select(.title | contains(\"Ideation — ${DATE}\")) | .title" 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Ideation discussion already exists for $DATE — skipping"
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "No ideation discussion found for $DATE — proceeding"
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - name: Gather ecosystem context
        if: steps.dedup.outputs.SKIP != 'true'
        id: context
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          DATE="${{ steps.dedup.outputs.DATE }}"
          echo "DATE=$DATE" >> $GITHUB_OUTPUT

          # Artifact inventory
          PERSONA_COUNT=$(ls personas/*.persona.yaml 2>/dev/null | wc -l)
          POLICY_COUNT=$(ls policies/*.yaml 2>/dev/null | wc -l)
          TEST_COUNT=$(ls tests/behavioral/*.md 2>/dev/null | wc -l)
          DEPT_COUNT=$(ls state/streeling/departments/*.department.json 2>/dev/null | wc -l)
          SIGNAL_COUNT=$(ls state/conscience/signals/*.json 2>/dev/null | wc -l)
          PATTERN_COUNT=$(ls state/conscience/patterns/*.json 2>/dev/null | wc -l)
          BELIEF_COUNT=$(ls state/beliefs/*.json 2>/dev/null | wc -l)

          # Recent commits (what just happened)
          RECENT=$(git log --oneline -10)

          # Recent changes (what files changed)
          CHANGED=$(git diff --name-only HEAD~5..HEAD 2>/dev/null | head -30)

          # Open issues across all repos
          DEMERZEL_ISSUES=$(gh issue list --repo GuitarAlchemist/Demerzel --state open --json number,title --jq '.[].title' | head -15)
          IX_ISSUES=$(gh issue list --repo GuitarAlchemist/ix --state open --json number,title --jq '.[].title' 2>/dev/null | head -5)
          TARS_ISSUES=$(gh issue list --repo GuitarAlchemist/tars --state open --json number,title --jq '.[].title' 2>/dev/null | head -5)
          GA_ISSUES=$(gh issue list --repo GuitarAlchemist/ga --state open --json number,title --jq '.[].title' 2>/dev/null | head -5)

          # Open PRs
          GA_PRS=$(gh pr list --repo GuitarAlchemist/ga --state open --json number,title --jq '.[].title' 2>/dev/null | head -5)

          # Conscience state
          CONSCIENCE=""
          if [ -f "state/conscience/weekly/2026-03-17-weekly.report.json" ]; then
            CONSCIENCE=$(jq -r '.self_reflection' state/conscience/weekly/*.report.json 2>/dev/null | head -5)
          fi

          # Build context
          cat > /tmp/ideation-context.md << CTXEOF
          # Ecosystem State — $DATE

          ## Artifacts
          Personas: $PERSONA_COUNT | Policies: $POLICY_COUNT | Tests: $TEST_COUNT
          Departments: $DEPT_COUNT | Beliefs: $BELIEF_COUNT
          Conscience signals: $SIGNAL_COUNT | Patterns: $PATTERN_COUNT

          ## Recent commits
          $RECENT

          ## Recently changed files
          $CHANGED

          ## Open issues
          ### Demerzel
          $DEMERZEL_ISSUES

          ### ix
          $IX_ISSUES

          ### tars
          $TARS_ISSUES

          ### ga
          $GA_ISSUES

          ## Open PRs (ga)
          $GA_PRS

          ## Conscience reflection
          $CONSCIENCE

          ## Key capabilities
          - ix: Rust ML pipelines, Karnaugh maps, governance dashboard, 40+ MCP tools
          - tars: F# Grammar×ML bridge, grammar distillation, governance generation, 150+ MCP tools, AI Functions
          - ga: .NET chatbot with 7 governed agents, MCP server
          - Demerzel: $POLICY_COUNT policies, conscience system, Streeling University ($DEPT_COUNT depts), governance experimentation
          CTXEOF

      - name: AI-powered ideation
        if: steps.dedup.outputs.SKIP != 'true'
        id: ideate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CONTEXT=$(cat /tmp/ideation-context.md)

          RESPONSE=$(curl -s --max-time 60 \
            https://api.anthropic.com/v1/messages \
            -H "x-api-key: $ANTHROPIC_API_KEY" \
            -H "content-type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d "$(jq -n \
              --arg ctx "$CONTEXT" \
              '{
                model: "claude-sonnet-4-6-20250514",
                max_tokens: 3000,
                system: "You are Demerzel and Seldon, governance coordinator and chancellor of Streeling University for the GuitarAlchemist AI ecosystem.\n\nGenerate 3-5 FRESH ideas based on the current ecosystem state. Ideas must be:\n1. Concrete and actionable (not vague aspirations)\n2. Grounded in what just changed (recent commits, open issues, conscience signals)\n3. Novel — do NOT repeat ideas that are already open issues\n4. Spanning different domains: governance, music theory, ML/AI, cross-repo integration, research\n\nFor each idea, output:\n- Title (concise, issue-ready)\n- Source (what triggered this idea — a commit, a gap, a pattern)\n- Problem (what is wrong or missing)\n- Proposal (specific action)\n- Priority (P0-P3)\n- Repos affected\n- Streeling department (which department should own this research)\n\nFormat as markdown with ### headers per idea. Be creative but practical.",
                messages: [{role: "user", content: ("Generate fresh ideation based on current ecosystem state:\n\n" + $ctx)}]
              }')" 2>/dev/null)

          # Log API response status for debugging
          RESP_TYPE=$(echo "$RESPONSE" | jq -r '.type // "no-response"' 2>/dev/null)
          RESP_ERROR=$(echo "$RESPONSE" | jq -r '.error // empty' 2>/dev/null)
          STOP_REASON=$(echo "$RESPONSE" | jq -r '.stop_reason // empty' 2>/dev/null)
          echo "API response type: $RESP_TYPE"
          echo "API stop_reason: $STOP_REASON"
          if [ -n "$RESP_ERROR" ]; then
            echo "::error::Anthropic API error: $RESP_ERROR"
          fi

          IDEAS=$(echo "$RESPONSE" | jq -r '.content[0].text' 2>/dev/null)

          if [ -z "$IDEAS" ] || [ "$IDEAS" = "null" ]; then
            echo "::warning::AI ideation failed — no content in API response"
            echo "Raw response (first 500 chars): $(echo "$RESPONSE" | head -c 500)"
            echo "IDEA_COUNT=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count ideas (### headers)
          IDEA_COUNT=$(echo "$IDEAS" | grep -c "^### " || echo "0")
          echo "IDEA_COUNT=$IDEA_COUNT" >> $GITHUB_OUTPUT

          # Build report
          DATE="${{ steps.context.outputs.DATE }}"
          cat > ideation-report.md << REPORTEOF
          ## 🧠 Demerzel & Seldon Ideation — $DATE

          **Ideas generated:** $IDEA_COUNT
          **Trigger:** $(if [ "${{ github.event_name }}" = "push" ]; then echo "Push to master (reactive)"; elif [ "${{ github.event_name }}" = "schedule" ]; then echo "Scheduled (periodic reflection)"; else echo "Manual dispatch"; fi)
          **Method:** AI-powered (Claude analysis of ecosystem state)

          ---

          $IDEAS

          ---

          ### How ideas become work

          1. **AI review** — ideas are cross-validated by a second Claude instance
          2. **Approved ideas** → auto-created as GitHub Issues
          3. **Issues** → triaged to [project board](https://github.com/orgs/GuitarAlchemist/projects/2)
          4. **Execution** — via governed Ralph Loops or Agent Teams

          *Generated by Demerzel (governance) and Seldon (knowledge) under the meta-compounding protocol.*
          REPORTEOF

      - name: Post ideas to Discussions
        if: steps.dedup.outputs.SKIP != 'true' && steps.ideate.outputs.IDEA_COUNT != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          DATE="${{ steps.context.outputs.DATE }}"
          BODY=$(cat ideation-report.md | jq -Rs .)

          URL=$(gh api graphql -f query="mutation {
            createDiscussion(input: {
              repositoryId: \"R_kgDORnMyyQ\",
              categoryId: \"DIC_kwDORnMyyc4C4eDV\",
              title: \"🧠 Demerzel Ideation — ${DATE}\",
              body: $BODY
            }) {
              discussion { url }
            }
          }" --jq '.data.createDiscussion.discussion.url' 2>/dev/null || echo "Failed to post ideas")
          echo "Ideas Discussion: $URL"
          echo "DISCUSSION_URL=$URL" >> $GITHUB_OUTPUT

      - name: AI review of ideas
        id: review
        if: steps.dedup.outputs.SKIP != 'true' && steps.ideate.outputs.IDEA_COUNT != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          IDEAS=$(cat ideation-report.md)

          # Get existing open issue titles to prevent duplicates
          EXISTING_ISSUES=$(gh issue list --repo GuitarAlchemist/Demerzel --state open --json title --jq '.[].title' | jq -Rs .)

          REVIEW=$(curl -s --max-time 45 \
            https://api.anthropic.com/v1/messages \
            -H "x-api-key: $ANTHROPIC_API_KEY" \
            -H "content-type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d "$(jq -n \
              --arg ideas "$IDEAS" \
              --arg existing "$EXISTING_ISSUES" \
              '{
                model: "claude-sonnet-4-6-20250514",
                max_tokens: 1500,
                system: ("You are a critical reviewer. Review these ideas. REJECT any that duplicate existing issues.\n\nExisting open issues:\n" + $existing + "\n\nFor each idea respond as JSON array:\n[{\"idea_number\": 1, \"verdict\": \"APPROVE|MODIFY|REJECT\", \"rationale\": \"...\", \"issue_title\": \"...\", \"labels\": [\"enhancement\"]}]\n\nBe rigorous. Reject duplicates and vague ideas."),
                messages: [{role: "user", content: $ideas}]
              }')" 2>/dev/null)

          REVIEW_TEXT=$(echo "$REVIEW" | jq -r '.content[0].text' 2>/dev/null)

          if [ -z "$REVIEW_TEXT" ] || [ "$REVIEW_TEXT" = "null" ]; then
            echo "REVIEW_READY=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract JSON from response
          REVIEW_JSON=$(echo "$REVIEW_TEXT" | sed -n '/\[/,/\]/p' | head -50)
          echo "$REVIEW_JSON" > /tmp/review.json

          APPROVED=$(echo "$REVIEW_JSON" | jq '[.[] | select(.verdict == "APPROVE")] | length' 2>/dev/null || echo "0")
          echo "APPROVED_COUNT=$APPROVED" >> $GITHUB_OUTPUT
          echo "REVIEW_READY=true" >> $GITHUB_OUTPUT

      - name: Create issues for approved ideas
        if: steps.dedup.outputs.SKIP != 'true' && steps.review.outputs.REVIEW_READY == 'true' && steps.review.outputs.APPROVED_COUNT != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          DATE="${{ steps.context.outputs.DATE }}"
          DISC_URL="${{ steps.ideate.outputs.DISCUSSION_URL }}"

          jq -c '.[] | select(.verdict == "APPROVE")' /tmp/review.json 2>/dev/null | while read -r item; do
            TITLE=$(echo "$item" | jq -r '.issue_title // empty')
            RATIONALE=$(echo "$item" | jq -r '.rationale // empty')
            IDEA_NUM=$(echo "$item" | jq -r '.idea_number // 0')

            [ -z "$TITLE" ] && continue

            # Final duplicate check
            EXISTING=$(gh issue list --repo GuitarAlchemist/Demerzel --state open --search "$TITLE" --json number --jq 'length' 2>/dev/null || echo "0")
            [ "$EXISTING" -gt 0 ] && continue

            gh issue create --repo GuitarAlchemist/Demerzel \
              --title "$TITLE" \
              --body "## From Demerzel Ideation — ${DATE}

          **Idea #${IDEA_NUM}** | **Review:** APPROVE
          **Rationale:** ${RATIONALE}
          **Source:** ${DISC_URL}

          ---
          *Auto-created by Demerzel Ideation pipeline.*" \
              --label "enhancement" 2>/dev/null

          done
