│         ├─ ScaleInfoSkill (GA.Business.ML/Agents/Skills)        │
│         ├─ IntervalInfoSkill (GA.Business.ML/Agents/Skills)     │
│         ├─ ModeExplorationSkill (GA.Business.ML/Agents/Skills)  │
│         └─ ProgressionSuggestionSkill (GA.Business.ML)          │
