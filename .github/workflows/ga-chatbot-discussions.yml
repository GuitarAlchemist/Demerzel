| Domain (skills) | [GA.Business.ML/Agents/Skills](https://github.com/GuitarAlchemist/ga/tree/master/Common/GA.Business.ML/Agents/Skills) | 1.0 (pure domain) |
| Governance | [Demerzel constitutions](https://github.com/GuitarAlchemist/Demerzel/tree/master/constitutions) | Verified |
| Belief state | [TARS BeliefState.fs](https://github.com/GuitarAlchemist/tars/blob/master/src/TarsEngine.FSharp.Core/Reasoning/BeliefState.fs) | T (True) |

