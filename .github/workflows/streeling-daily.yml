name: Streeling Weekly Harvest & Report

on:
  schedule:
    # Run every Friday at 13:17 UTC (8:17 AM EST)
    - cron: '17 13 * * 5'
  workflow_dispatch: # Allow manual trigger anytime

permissions:
  contents: read
  discussions: write

jobs:
  harvest-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Demerzel
        uses: actions/checkout@v4

      - name: Harvest knowledge via GitHub API
        id: harvest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          cat > harvest-report.md << 'HEADER'
          ## Streeling Daily Harvest

          **Date:** DATE_PLACEHOLDER
          **Issued by:** Seldon (Knowledge Transfer Specialist)
          **Coordinated by:** Demerzel (Governance Coordinator)

          ---

          HEADER
          sed -i "s/DATE_PLACEHOLDER/$DATE/" harvest-report.md

          # Count governance artifacts in Demerzel
          PERSONAS=$(ls personas/*.persona.yaml 2>/dev/null | wc -l)
          POLICIES=$(ls policies/*.yaml 2>/dev/null | wc -l)
          SCHEMAS=$(ls schemas/contracts/*.json 2>/dev/null | wc -l)
          LOGIC=$(ls logic/*.json 2>/dev/null | wc -l)
          TESTS=$(ls tests/behavioral/*.md 2>/dev/null | wc -l)
          SKILLS=$(ls -d .claude/skills/*/ 2>/dev/null | wc -l)

          cat >> harvest-report.md << EOF
          ### 📊 Demerzel Governance Inventory
          | Artifact | Count |
          |----------|-------|
          | Personas | $PERSONAS |
          | Policies | $POLICIES |
          | Contract Schemas | $SCHEMAS |
          | Logic Schemas | $LOGIC |
          | Behavioral Test Suites | $TESTS |
          | Claude Code Skills | $SKILLS |

          EOF

          # Scan each consumer repo via API
          for REPO in ix tars ga; do
            echo "### 🔍 $REPO repo" >> harvest-report.md

            # Recent commits (last 24h)
            SINCE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)
            COMMITS=$(gh api "repos/GuitarAlchemist/$REPO/commits?since=$SINCE&per_page=100" --jq 'length' 2>/dev/null || echo "0")
            echo "- **Recent commits (24h):** $COMMITS" >> harvest-report.md

            # Recent commit messages
            if [ "$COMMITS" -gt 0 ] 2>/dev/null; then
              echo "- **Recent changes:**" >> harvest-report.md
              gh api "repos/GuitarAlchemist/$REPO/commits?since=$SINCE&per_page=5" --jq '.[] | "  - `\(.sha[0:7])` \(.commit.message | split("\n")[0])"' 2>/dev/null >> harvest-report.md
            fi

            # Check for state directory
            STATE=$(gh api "repos/GuitarAlchemist/$REPO/contents/state" --jq 'length' 2>/dev/null || echo "none")
            if [ "$STATE" != "none" ] && [ "$STATE" -gt 0 ] 2>/dev/null; then
              echo "- **State directory:** initialized ($STATE entries)" >> harvest-report.md
            else
              echo "- **State directory:** not yet initialized" >> harvest-report.md
            fi

            # Check for open discussions
            DISCUSSIONS=$(gh api "repos/GuitarAlchemist/$REPO/discussions" --jq 'length' 2>/dev/null || echo "0")
            echo "- **Open discussions:** $DISCUSSIONS" >> harvest-report.md

            echo "" >> harvest-report.md
          done

          # Knowledge base status
          cat >> harvest-report.md << 'EOF'
          ### 📚 Knowledge Base (NotebookLM)
          | Notebook | Topics |
          |----------|--------|
          | Compound the Compounding | Meta-compounding, DSL evolution, grammar governance |
          | Probabilistic Grammars | Constrained decoding, PCFGs, neuro-symbolic AI |
          | Semantic Event Routing | Multi-agent orchestration, bounded fuzziness, OPTIC-K |
          | Microsoft AI Agents | Agentic patterns, trustworthy agents, context engineering |

          ### 📋 Active Directives
          EOF

          # Check for directive files
          if ls examples/sample-data/directive-*.json 1>/dev/null 2>&1; then
            for f in examples/sample-data/directive-*.json; do
              ID=$(jq -r '.id' "$f" 2>/dev/null)
              TARGET=$(jq -r '.target_repo' "$f" 2>/dev/null)
              PRIORITY=$(jq -r '.priority' "$f" 2>/dev/null)
              echo "- \`$ID\` → **$TARGET** (priority: $PRIORITY)" >> harvest-report.md
            done
          else
            echo "- No active directives" >> harvest-report.md
          fi

          cat >> harvest-report.md << 'EOF'

          ---
          *This digest was generated by the Streeling Daily Harvest workflow. Governed by Demerzel under the Asimov constitution.*

          📎 [Demerzel Repo](https://github.com/GuitarAlchemist/Demerzel) · [Governance Mandate](https://github.com/GuitarAlchemist/Demerzel/blob/master/constitutions/demerzel-mandate.md) · [Galactic Protocol](https://github.com/GuitarAlchemist/Demerzel/blob/master/contracts/galactic-protocol.md)
          EOF

          echo "HARVEST_COMPLETE=true" >> $GITHUB_OUTPUT
          echo "Report generated:"
          cat harvest-report.md

      - name: Post to Demerzel Discussions
        if: steps.harvest.outputs.HARVEST_COMPLETE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BODY=$(cat harvest-report.md | jq -Rs .)

          URL=$(gh api graphql -f query="mutation {
            createDiscussion(input: {
              repositoryId: \"R_kgDORnMyyQ\",
              categoryId: \"DIC_kwDORnMyyc4C4eDS\",
              title: \"🤖 Demerzel Governance Report — $DATE\",
              body: $BODY
            }) {
              discussion { url }
            }
          }" --jq '.data.createDiscussion.discussion.url' 2>/dev/null || echo "Failed to post to Demerzel Discussions")
          echo "Demerzel Discussion: $URL"

      - name: Generate Seldon academic digest
        id: seldon
        run: |
          DATE=$(date -u +%Y-%m-%d)

          cat > seldon-digest.md << SELDON_EOF
          ## Seldon Knowledge Digest — Weekly Report

          **Date:** $DATE
          **Issued by:** [Seldon](https://github.com/GuitarAlchemist/Demerzel/blob/master/personas/seldon.persona.yaml) (Knowledge Transfer Specialist)
          **Framework:** [Streeling](https://github.com/GuitarAlchemist/Demerzel/blob/master/policies/streeling-policy.yaml) Knowledge Transfer Protocol

          ---

          ### 📖 Research Knowledge Base

          The following notebooks form the ecosystem's institutional memory. Seldon draws from these for curriculum design and cross-repo knowledge transfer.

          | Notebook | Focus | Key Concepts | Link |
          |----------|-------|-------------|------|
          | **Compound the Compounding** | Meta-engineering | DSL evolution, grammar governance, promotion staircase, CompoundCore + domain semantics architecture | [Open in NotebookLM](https://notebooklm.google.com/notebook/b9f51708-11cf-4618-ae4d-6981c9e02891) |
          | **Probabilistic Grammars & Constrained LLM Reasoning** | Neuro-symbolic AI | Constrained decoding (CRANE, GCD), PCFGs, alignment frameworks (STEP-KTO), formal verification, cognitive vulnerabilities | [Open in NotebookLM](https://notebooklm.google.com/notebook/6b810c22-dcc3-45dd-a0f3-2e7921de5863) |
          | **Semantic Event Routing Architecture** | Multi-agent orchestration | Bounded fuzziness, confidence protocols, crisp/fuzzy channels, embedding-based routing, OPTIC-K, truth maintenance | [Open in NotebookLM](https://notebooklm.google.com/notebook/c9470f2a-a97a-4d94-a38d-a1fb22b99bf8) |
          | **Microsoft AI Agents for Beginners** | Agentic patterns | Reflection, Tool Use, ReAct, Planning, Multi-Agent, HITL, context engineering, agent memory | [Course repo](https://github.com/microsoft/ai-agents-for-beginners) |

          ### 🔬 Cross-Repo Technical Analysis

          SELDON_EOF

          # Add harvest data
          cat harvest-report.md >> seldon-digest.md

          cat >> seldon-digest.md << 'SELDON_FOOTER'

          ### 🧠 Governance-Research Connections

          Key mappings between Demerzel governance and research foundations:

          | Governance Artifact | Research Basis | Notebook |
          |-------------------|----------------|----------|
          | [Tetravalent Logic](https://github.com/GuitarAlchemist/Demerzel/blob/master/logic/tetravalent-logic.md) | Multi-valued logic, probabilistic reasoning | Probabilistic Grammars |
          | [Confidence Calibration](https://github.com/GuitarAlchemist/Demerzel/blob/master/policies/scientific-objectivity-policy.yaml) | STEP-KTO alignment, evidence-grounded scoring | Probabilistic Grammars |
          | [Crisp/Fuzzy Channels](https://github.com/GuitarAlchemist/Demerzel/blob/master/contracts/galactic-protocol.md) | Bounded fuzziness, deterministic vs. explanatory output | Semantic Event Routing |
          | [Affordance Matching](https://github.com/GuitarAlchemist/Demerzel/blob/master/contracts/galactic-protocol.md) | Embedding-based agent routing, OPTIC-K similarity | Semantic Event Routing |
          | [Governance Promotion](https://github.com/GuitarAlchemist/Demerzel/blob/master/contracts/galactic-protocol.md) | Grammar governance, promotion staircase | Compound the Compounding |
          | [Agentic Patterns Catalog](https://github.com/GuitarAlchemist/Demerzel/blob/master/policies/autonomous-loop-policy.yaml) | 7 agentic design patterns | Microsoft AI Agents |
          | [Ralph Loop Governance](https://github.com/GuitarAlchemist/Demerzel/blob/master/policies/autonomous-loop-policy.yaml) | Autonomous iterative development with convergence/regression/drift checks | Compound the Compounding |

          ### 📚 Recommended Reading

          - [TARS v1 Exploration Reflections](https://github.com/GuitarAlchemist/tars/tree/main/v1/docs/Explorations/Reflections) — Source material for agentic AI workflows, auto-improvement strategies, and state-space reasoning
          - [Awesome Claude AI Resources](https://awesomeclaude.ai/) — Curated directory of Claude Code plugins, MCP servers, and agent frameworks
          - [Demerzel Architecture](https://github.com/GuitarAlchemist/Demerzel/blob/master/docs/architecture.md) — Full governance framework architecture

          ---

          *This digest was generated by Seldon under the [Streeling Knowledge Transfer Protocol](https://github.com/GuitarAlchemist/Demerzel/blob/master/policies/streeling-policy.yaml). Knowledge is classified into three layers: governance (universal), experiential (ecosystem-wide), and domain (repo-specific). All findings are subject to [confidence calibration](https://github.com/GuitarAlchemist/Demerzel/blob/master/policies/scientific-objectivity-policy.yaml) and [tetravalent assessment](https://github.com/GuitarAlchemist/Demerzel/blob/master/logic/tetravalent-logic.md).*
          SELDON_FOOTER

          echo "SELDON_COMPLETE=true" >> $GITHUB_OUTPUT

      - name: Post Seldon digest to org Discussions
        if: steps.seldon.outputs.SELDON_COMPLETE == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BODY=$(cat seldon-digest.md | jq -Rs .)

          URL=$(gh api graphql -f query="mutation {
            createDiscussion(input: {
              repositoryId: \"R_kgDORnMyyQ\",
              categoryId: \"DIC_kwDORnMyyc4C4eDT\",
              title: \"📚 Seldon Knowledge Digest — $DATE\",
              body: $BODY
            }) {
              discussion { url }
            }
          }" --jq '.data.createDiscussion.discussion.url' 2>/dev/null || echo "Failed to post Seldon digest")
          echo "Seldon Digest: $URL"
