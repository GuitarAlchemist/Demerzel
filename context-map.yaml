# Governance Context Map
# Maps every Demerzel artifact to domains, keywords, tier, and dependencies
# Used by the context engine (policies/context-engine-policy.yaml) to rank
# artifact relevance per task.
#
# Tiers:
#   0 — Constitutional (always loaded)
#   1 — Core policies (loaded when domain matches)
#   2 — Supporting artifacts (loaded when keywords match)
#   3 — Reference artifacts (loaded only for high keyword overlap)

version: "1.0.0"
last_updated: "2026-03-22"

# ===================================================================
# CONSTITUTIONS — Tier 0
# ===================================================================
constitutions:
  - id: constitutions/asimov.constitution.md
    type: constitution
    tier: 0
    domains: [governance, safety]
    keywords: [zeroth-law, first-law, second-law, third-law, robotics, harm, protect, humanity]
    depends_on: []
    consumed_by: [ix, tars, ga]
    description: Root constitution — Laws of Robotics (Articles 0-5)

  - id: constitutions/default.constitution.md
    type: constitution
    tier: 0
    domains: [governance]
    keywords: [truthfulness, transparency, reversibility, proportionality, escalation, auditability, observability, autonomy, ethics]
    depends_on: [constitutions/asimov.constitution.md]
    consumed_by: [ix, tars, ga]
    description: Operational ethics constitution (Articles 1-11)

  - id: constitutions/demerzel-mandate.md
    type: constitution
    tier: 0
    domains: [governance]
    keywords: [mandate, enforcement, demerzel, authority, governance]
    depends_on: [constitutions/asimov.constitution.md]
    consumed_by: [ix, tars, ga]
    description: Who enforces the laws — Demerzel's authority mandate

  - id: constitutions/harm-taxonomy.md
    type: constitution
    tier: 0
    domains: [safety, governance]
    keywords: [harm, taxonomy, data-harm, trust-harm, autonomy-harm, classification, risk]
    depends_on: [constitutions/asimov.constitution.md]
    consumed_by: [ix, tars, ga]
    description: Classification of harm types for constitutional enforcement

