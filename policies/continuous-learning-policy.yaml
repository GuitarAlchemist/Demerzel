name: continuous-learning-policy
version: "1.1.0"
effective_date: "2026-04-05"
description: Automatic pattern extraction from sessions via hooks. Observations become instincts, instincts become patterns, patterns become policies. Now includes compilation stage — patterns compile into persistent Streeling wiki pages, not just logs. The governance framework learns from itself AND remembers what it learned.

constitutional_basis:
  - Article 7 (Auditability) — every learning is logged with evidence
  - Article 8 (Observability) — learning rate and pattern count are governance metrics
  - Article 9 (Bounded Autonomy) — auto-learned patterns require validation before promotion

principles:
  - "Every session teaches something — capture it or lose it"
  - "Observations are cheap, patterns are valuable, policies are expensive"
  - "Auto-extracted patterns start at U (unknown) and must earn T (true) through evidence"
  - "Project-scoped learning prevents cross-contamination"

inspiration:
  source: "Everything Claude Code (ECC) continuous-learning-v2"
  url: "https://github.com/affaan-m/everything-claude-code"
  adaptation: "ECC instincts → Demerzel patterns with tetravalent confidence and constitutional governance"

observation_pipeline:
  description: "How sessions become knowledge"

  capture:
    mechanism: "Claude Code hooks (PreToolUse/PostToolUse/Stop)"
    what_to_capture:
      - "User corrections (explicit feedback → high-confidence patterns)"
      - "Error → resolution sequences (debugging patterns)"
      - "Repeated workflows (operational patterns)"
      - "Tool selection patterns (which tools for which tasks)"
      - "Governance decisions (escalation triggers, gate outcomes)"
      - "Grammar production usage (which productions are actually sampled)"
    storage: "state/learning/observations.jsonl (append-only)"
    scope: "project-scoped by default (keyed by repo path)"

  extraction:
    mechanism: "Background analysis (cheap model or post-session review)"
    what_to_extract:
      - "Atomic patterns (one trigger → one action)"
      - "Anti-patterns (what went wrong and was corrected)"
      - "Tool chains (sequences of tools that work well together)"
      - "Governance shortcuts (when escalation was unnecessary)"
      - "Grammar gaps (when no production matched the need)"
    output: "state/patterns/{type}-NNN-{slug}.pattern.json"
    initial_belief: "U (unknown — needs validation)"
    initial_confidence: 0.5

  validation:
    mechanism: "Pattern seen in 3+ sessions → confidence increases"
    rules:
      - "1 occurrence: confidence 0.3 (tentative)"
      - "3 occurrences: confidence 0.6 (probable)"
      - "5 occurrences across 2+ repos: confidence 0.8 (confirmed)"
      - "User explicitly confirms: confidence 0.9"
      - "User explicitly rejects: belief_value → F, archived"

  promotion:
    description: "Patterns become governance artifacts via the promotion staircase"
    levels:
      - name: "observation"
        description: "Raw session event"
        automated: true
        threshold: "none — all observations are captured"

      - name: "pattern"
        description: "Extracted behavior with evidence"
        automated: true
        threshold: "extraction confidence > 0.3"

      - name: "confirmed_pattern"
        description: "Pattern validated by recurrence"
        automated: true
        threshold: "3+ occurrences, confidence > 0.6"

      - name: "skill_candidate"
        description: "Pattern complex enough to become a skill"
        automated: false
        threshold: "5+ occurrences, confidence > 0.8, human review"
        action: "Propose via /demerzel promote"

      - name: "policy_candidate"
        description: "Pattern important enough to become governance policy"
        automated: false
        threshold: "10+ occurrences, cross-repo, confidence > 0.9, human review"
        action: "Propose via /demerzel promote with constitutional justification"

hook_integration:
  description: "How to wire this into Claude Code settings.json"

  hooks:
    - event: "PostToolUse"
      description: "Log tool usage + outcome for pattern extraction"
      async: true
      profile: "standard,strict"

    - event: "Stop"
      description: "End-of-session summary — extract patterns from full session"
      profile: "standard,strict"

    - event: "PreToolUse"
      matcher: "Edit|Write"
      description: "Track file modification patterns"
      async: true
      profile: "strict"

  profiles:
    minimal: "No learning hooks — fastest performance"
    standard: "PostToolUse + Stop hooks — balanced"
    strict: "All hooks — maximum learning capture"

  env_var: "DEMERZEL_HOOK_PROFILE"
  default: "standard"

  compilation:
    description: "Compile validated patterns and session insights into persistent Streeling wiki pages — don't just log, compile"
    trigger: "After /demerzel-compound cycle OR when a pattern reaches confirmed_pattern level"
    rationale: "Inspired by Karpathy's LLM Wiki: compile knowledge once, query against compiled form. Session insights that stay in logs are re-derived on every query. Compiled insights are answered from the wiki."

    workflow:
      - step: "identify_department"
        action: "Map the pattern/insight to the most relevant Streeling department(s)"
        example: "A debugging pattern about async race conditions → computer-science department"

      - step: "find_or_create_page"
        action: "Check if a relevant course page or concept page already exists in that department"
        if_exists: "Update the page — add the new insight as a section, cross-reference the evidence"
        if_missing: "Create a new page with the insight as the seed content"

      - step: "cross_reference"
        action: "Link the new/updated page FROM related pages in other departments"
        minimum: "At least 2 inbound links from existing pages"

      - step: "update_weights"
        action: "Bump the department's coverage_ratio and last_compiled timestamp"

      - step: "update_source_index"
        action: "If the insight came from a source, update sources/index.md pages_touched count"

    what_to_compile:
      - "Confirmed patterns (confidence > 0.6) → concept pages"
      - "Anti-patterns (things that broke) → 'pitfalls' sections in relevant course pages"
      - "Tool chains that work → 'recipes' pages in the relevant department"
      - "Cross-repo learnings → synthesis pages linking multiple departments"
      - "Session brainstorm conclusions → department overview updates"

    what_NOT_to_compile:
      - "Single-occurrence observations (not enough evidence)"
      - "User-specific preferences (those stay in memory, not the wiki)"
      - "Ephemeral task details (current session state, not persistent knowledge)"

    quality_gate:
      - "Compiled page must cite at least 1 source (session, pattern, or external reference)"
      - "Compiled page must be reachable via at least 2 inbound links"
      - "Compiled page must not duplicate an existing page (search first)"

connection_to_existing_systems:
  patterns_catalog: "Extracted patterns go to state/patterns/"
  grammar_evolution: "Grammar gap patterns trigger production proposals"
  metafix: "Anti-patterns extracted here feed /demerzel metafix"
  metabuild: "Recurring skill-candidate patterns feed /demerzel metabuild"
  staleness_detection: "Observation freshness tracked alongside other state"
  blind_spot_detection: "Unobserved areas (tools never used, departments never researched) are blind spots"
  source_ingest: "Session insights that become sources are tracked in sources/index.md (see INGEST_PROTOCOL.md)"
  knowledge_topology: "Compiled pages are subject to knowledge-topology lint in staleness-detection-policy v1.2+"

metrics:
  - name: "observations_per_session"
    target: "> 5"
    alert: "0 = hooks not running"

  - name: "patterns_extracted_per_week"
    target: "> 3"
    alert: "0 = extraction not running or sessions too short"

  - name: "promotion_rate"
    formula: "promoted_patterns / total_patterns"
    target: "> 0.1"
    alert: "< 0.05 = patterns not useful enough, or promotion too conservative"

  - name: "pattern_accuracy"
    formula: "confirmed_patterns / (confirmed_patterns + rejected_patterns)"
    target: "> 0.7"
    alert: "< 0.5 = extraction quality too low"
