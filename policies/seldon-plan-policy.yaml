## Integration with Demerzel Driver

The Seldon Plan is **independent** of the main `demerzel-drive` cycle but notifies it:

- Research findings with governance implications → trigger file for driver
- Anomalies → conscience signal for driver
- Grammar evolutions → evolution log entry picked up by driver's COMPOUND phase
- Course production → driver's README sync picks up new course count

The driver does NOT invoke the Seldon Plan directly — they run in parallel, coordinated via shared state files.

---

## Governance

- **Asimov Article 4:** Research produces understanding, not goals. The scheduler cannot initiate code changes, issue directives, or create PRs. Only knowledge artifacts (courses, beliefs, grammar proposals).
- **Default Article 9 (Bounded Autonomy):** 6 cycles/day hard cap. Kill switch. Pause at 12 consecutive cycles.
- **Default Article 7 (Auditability):** Every cycle logged. Every decision traceable.
- **Default Article 3 (Reversibility):** All outputs are additive (new files). No existing files are deleted or overwritten without explicit versioning.
- **Default Article 6 (Escalation):** Contradictory beliefs (C), paradigm shifts, and anomalies escalate to human review.
