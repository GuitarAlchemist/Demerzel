## Observability

### Metrics
| Metric | Formula | Target | Alert |
|---|---|---|---|
| daily_cycle_utilization | cycles_today / 6 | 0.7–1.0 | < 0.3 = scheduler not firing |
| novelty_rate | novel_findings / cycles_run | > 0.5 | < 0.2 = research stagnating |
| course_production_rate | courses_produced / novel_T_findings | > 0.7 | < 0.4 = low conviction findings |
| cross_model_agreement | agreed_pairs / total_validations | > 0.8 | < 0.5 = poor domain coverage |
| anomaly_rate | anomalies_detected / cycles_run | < 0.05 | > 0.15 = knowledge base degrading |
| grammar_evolution_rate | productions_added / cycles_run | 0.05–0.2 | > 0.3 = grammar churn |

### Status Report Format
```
Seldon Plan Status — {date}
─────────────────────────────
Cycles today:      {n}/6
Total all-time:    {total}
Kill switch:       {active/inactive}
Consecutive auto:  {n}/12

Last cycle:        {cycle_id}
  Department:      {dept}
  Question:        "{question}"
  Belief:          {value} ({confidence})
  Course produced: {yes/no}

Today's findings:
  T (confirmed):   {n}
  F (refuted):     {n}
  U (unknown):     {n}
  C (contradictory): {n}

Novelty registry:  {total} entries
Courses produced:  {total} lifetime
```

