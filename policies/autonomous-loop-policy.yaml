## Version History

rationale: |
  v1.1.0 — Extends Demerzel's autonomous authority for domain work via the
  Article 4 authorization model. Adds domain_work_authorization to ensure every
  action traces to an explicit human-visible artifact (roadmap item, GitHub issue,
  governance task, or self-created issue with rationale). Adds self_merge_authority
  with graduated confidence thresholds, conscience integration, and hard stops
  to enable autonomous velocity while maintaining safety. Critical-risk work is
  never self-merged. Zeroth Law concerns trigger immediate halt.
